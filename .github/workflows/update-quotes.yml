name: Update NSE logistics quotes

on:
  schedule:
    # Every 15 minutes, 03:00–10:15 UTC = 08:30–15:45 IST, Mon–Fri.
    # Covers NSE trading hours (9:15 AM–3:30 PM IST) with a buffer on each side.
    - cron: "*/15 3-10 * * 1-5"
  workflow_dispatch: {}   # lets you trigger a manual run from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest quotes
        run: python scripts/fetch_quotes.py

      - name: Commit and push if data changed
        run: |
          git config user.name "nse-logistics-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update quotes: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
